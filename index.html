<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arcade Poem Dungeon — Off the Grid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* styles.css */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  font-family: "Press Start 2P", monospace;
  color: #0f0;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(0,255,0,0.04) 0px,
      rgba(0,255,0,0.04) 2px,
      rgba(0,0,0,0.08) 3px
    );
  mix-blend-mode: screen;
  pointer-events: none;
  z-index: 1000;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 100%);
  pointer-events: none;
  z-index: 999;
}

@keyframes glitch {
  0% { transform: translate(0,0); filter: none; }
  20% { transform: translate(-1px, 0); filter: hue-rotate(10deg); }
  40% { transform: translate(1px, -1px); filter: contrast(1.2); }
  60% { transform: translate(-2px, 1px); filter: saturate(1.4); }
  80% { transform: translate(1px, 2px); filter: hue-rotate(-10deg); }
  100% { transform: translate(0,0); filter: none; }
}

.glitch {
  animation: glitch 0.25s infinite;
}

.arcade-glow {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,0,0.15), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(0,255,0,0.1), transparent 60%);
  mix-blend-mode: screen;
  pointer-events: none;
  z-index: 950;
}

#menuScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
}

.menu-title {
  font-size: 1.8rem;
  text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
  letter-spacing: 0.2em;
}

.menu-subtitle {
  margin-top: 1rem;
  font-size: 0.8rem;
  color: #0a0;
}

.menu-buttons {
  margin-top: 2rem;
}

.menu-buttons button {
  display: block;
  padding: 0.8rem 1.2rem;
  margin: 0.6rem auto;
  width: 260px;
  border: 2px solid #0f0;
  border-radius: 4px;
  background: rgba(0,0,0,0.8);
  color: #0f0;
  cursor: pointer;
  font-size: 0.8rem;
  text-transform: uppercase;
  text-shadow: 0 0 6px #0f0;
  box-shadow: 0 0 12px rgba(0,255,0,0.4);
  transition: background 0.2s, color 0.2s, box-shadow 0.2s, transform 0.1s;
}

.menu-buttons button:hover {
  background: #0f0;
  color: #000;
  box-shadow: 0 0 18px #0f0;
  transform: translateY(-1px);
}

#levelSelect {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 3rem;
  text-align: center;
  height: 100%;
}

.level-select-title {
  font-size: 1.2rem;
  text-shadow: 0 0 10px #0f0;
}

.level-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 1rem;
  width: 80%;
  margin-top: 2rem;
}

.level-btn {
  padding: 0.8rem;
  border: 2px solid #0f0;
  border-radius: 4px;
  background: rgba(0,0,0,0.85);
  color: #0f0;
  cursor: pointer;
  font-size: 0.8rem;
  text-shadow: 0 0 6px #0f0;
  box-shadow: 0 0 10px rgba(0,255,0,0.3);
  transition: background 0.2s, color 0.2s, transform 0.1s, box-shadow 0.2s;
}

.level-btn:hover {
  background: #0f0;
  color: #000;
  transform: translateY(-1px);
  box-shadow: 0 0 16px #0f0;
}

.level-locked {
  border-color: #044;
  color: #044;
  box-shadow: none;
  cursor: not-allowed;
  text-shadow: none;
}

.level-locked:hover {
  background: rgba(0,0,0,0.85);
  color: #044;
  transform: none;
}

#scoreboard {
  display: none;
  position: absolute;
  top: 1.5rem;
  left: 1.5rem;
  color: #0f0;
  font-size: 0.9rem;
  text-shadow: 0 0 8px #0f0;
  z-index: 10;
}

#scoreboard div {
  margin-bottom: 0.4rem;
}

#poemGrid {
  display: none;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1.5rem;
  padding: 4rem 3rem;
  font-size: 0.9rem;
  color: #0f0;
  text-align: center;
}

.poemWord {
  padding: 0.8rem;
  border: 2px solid #0f0;
  border-radius: 4px;
  background: rgba(0,0,0,0.9);
  box-shadow: 0 0 10px rgba(0,255,0,0.4);
  cursor: pointer;
  text-shadow: 0 0 6px #0f0;
  transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
}

.poemWord:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 16px #0f0;
}

#levelComplete,
#gameComplete {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: radial-gradient(circle at center, rgba(0,0,0,0.9), #000);
  color: #0f0;
  text-shadow: 0 0 10px #0f0;
}

#gameComplete {
  text-shadow: 0 0 14px #0f0;
}

#levelComplete h1,
#gameComplete h1 {
  font-size: 1.4rem;
  margin-bottom: 1rem;
}

#levelComplete button,
#gameComplete button {
  padding: 0.8rem;
  margin: 0.6rem;
  width: 220px;
  border: 2px solid #0f0;
  border-radius: 4px;
  background: rgba(0,0,0,0.85);
  color: #0f0;
  cursor: pointer;
  font-size: 0.8rem;
  text-shadow: 0 0 6px #0f0;
  box-shadow: 0 0 10px rgba(0,255,0,0.3);
  transition: background 0.2s, color 0.2s, box-shadow 0.2s, transform 0.1s;
}

#levelComplete button:hover,
#gameComplete button:hover {
  background: #0f0;
  color: #000;
  box-shadow: 0 0 16px #0f0;
  transform: translateY(-1px);
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  color: #0f0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.overlay-content {
  text-align: center;
  padding: 2rem;
  border: 2px solid #0f0;
  border-radius: 4px;
  background: rgba(0,0,0,0.95);
  box-shadow: 0 0 16px rgba(0,255,0,0.4);
}

.overlay-content h2 {
  margin-bottom: 1rem;
  text-shadow: 0 0 10px #0f0;
}

.overlay-content input[type="range"] {
  width: 100%;
  margin: 0.6rem 0;
}

.particle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: #0f0;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.8;
  animation: fly 1.2s linear forwards;
}

@keyframes fly {
  from { transform: translate(0,0); opacity: 1; }
  to { transform: translate(var(--dx), var(--dy)); opacity: 0; }
}

@keyframes scrollCredits {
  from { bottom: -100%; }
  to { bottom: 110%; }
}

#creditsOverlay {
  background: #000;
  overflow: hidden;
}

#creditsOverlay .overlay-content {
  position: absolute;
  bottom: -100%;
  width: 100%;
  animation: scrollCredits 18s linear forwards;
  text-shadow: 0 0 10px #0f0;
  text-align: center;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="arcade-glow"></div>

<div class="cabinet" style="position:absolute; top:50%; left:50%; width:88vw; height:88vh; transform:translate(-50%, -50%); background:#111; border:12px solid #0f0; border-radius:18px; box-shadow:0 0 40px #0f0, 0 0 80px #0f0 inset; overflow:hidden;">
  <div class="dungeon-bg" style="position:absolute; inset:0; background-image:linear-gradient(#020 1px, transparent 1px), linear-gradient(90deg, #020 1px, transparent 1px); background-size:32px 32px; opacity:0.4; pointer-events:none;"></div>

  <!-- Scoreboard & Level HUD -->
  <div id="scoreboard">
    <div id="levelIndicator">LEVEL 1 / 15</div>
    <div id="scoreIndicator">SCORE: 0</div>
  </div>

  <!-- Main Menu Screen -->
  <div id="menuScreen" class="screen">
    <div class="menu-title vhs">ARCADE POEM DUNGEON</div>
    <div class="menu-subtitle">OFF THE GRID</div>
    <div class="menu-buttons">
      <button onclick="openLevelSelect()">🗺️ LEVEL SELECT</button>
      <button onclick="showInstructions()">❖ HOW TO PLAY</button>
      <button onclick="showCredits()">★ CREDITS</button>
    </div>
  </div>

  <!-- Level Select Screen -->
  <div id="levelSelect" class="screen">
    <div class="level-select-title">SELECT LEVEL</div>
    <div class="level-grid" id="levelGrid"></div>
    <div class="menu-buttons" style="margin-top: 1.5rem;">
      <button onclick="returnToMenu()">🏠 BACK</button>
    </div>
  </div>

  <!-- Poem Word Grid -->
  <div id="poemGrid"></div>

  <!-- Level Complete Screen -->
  <div id="levelComplete" class="screen">
    <h1 id="levelCompleteTitle">LEVEL COMPLETED!</h1>
    <div class="menu-buttons">
      <button class="nextLevelBtn" onclick="nextLevel()">▶ NEXT LEVEL</button>
      <button onclick="returnToMenu()">🏠 MAIN MENU</button>
    </div>
  </div>

  <!-- Grand Victory Screen -->
  <div id="gameComplete" class="screen">
    <h1>CONGRATULATIONS!<br>YOU BEAT ALL 15 LEVELS!</h1>
    <div class="menu-buttons">
      <button onclick="restartFullGame()">🔄 PLAY AGAIN</button>
      <button onclick="returnToMenu()">🏠 MAIN MENU</button>
    </div>
  </div>
</div>

<!-- Settings Overlay -->
<div class="overlay" id="settingsOverlay">
  <div class="overlay-content">
    <h2>SYSTEM SETTINGS</h2>
    <label>CRT Intensity</label>
    <input type="range" id="crtRange" min="0.2" max="1" step="0.1" value="1">
    
    <label>Glitch Level</label>
    <input type="range" id="glitchRange" min="0" max="1" step="0.1" value="1">
    
    <label>Soundtrack Volume</label>
    <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.6">
    
    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
      <button class="level-btn" onclick="closeSettings()">RESUME</button>
      <button class="level-btn" style="border-color: #f00; color: #f00;" onclick="returnToMenuFromESC()">MAIN MENU</button>
    </div>
  </div>
</div>

<!-- Retro Scrolling Credits -->
<div class="overlay" id="creditsOverlay">
  <div class="overlay-content">
    <div class="credit-line">ARCADE POEM DUNGEON</div>
    <div class="credit-line">CREATED BY</div>
    <div class="credit-line">Christine Julian</div>
    <div class="credit-line">PIXEL DUNGEON BACKGROUND</div>
    <div class="credit-line">SYNTH NARRATOR VOICE</div>
    <div class="credit-line">8-BIT SOUNDTRACK</div>
    <div class="credit-line">THANK YOU FOR PLAYING</div>
  </div>
</div>

<!-- Audio Elements (BGM sourced from user Spotify intent reference track) -->
<audio id="bgm" loop>
  <source src="https://files.catbox.moe/8bitloop.mp3" type="audio/mpeg">
</audio>
<audio id="hitSfx">
  <source src="https://files.catbox.moe/hitbeep.mp3" type="audio/mpeg">
</audio>

<script>
let currentLevel = 1;
let highestUnlockedLevel = parseInt(localStorage.getItem("highestUnlockedLevel")) || 1;
const maxLevels = 15;
let score = 0;

const levelTargets = {};
for (let i = 1; i <= maxLevels; i++) {
  levelTargets[i] = i * 10; 
}

const menuScreen = document.getElementById("menuScreen");
const levelSelect = document.getElementById("levelSelect");
const levelGrid = document.getElementById("levelGrid");
const poemGrid = document.getElementById("poemGrid");
const scoreboard = document.getElementById("scoreboard");
const levelIndicator = document.getElementById("levelIndicator");
const scoreIndicator = document.getElementById("scoreIndicator");
const levelComplete = document.getElementById("levelComplete");
const gameComplete = document.getElementById("gameComplete");
const settingsOverlay = document.getElementById("settingsOverlay");
const creditsOverlay = document.getElementById("creditsOverlay");

const bgm = document.getElementById("bgm");
const hitSfx = document.getElementById("hitSfx");

function openLevelSelect() {
  menuScreen.style.display = "none";
  buildLevelSelectButtons();
  levelSelect.style.display = "flex";
}

function buildLevelSelectButtons() {
  levelGrid.innerHTML = "";
  for (let i = 1; i <= maxLevels; i++) {
    const btn = document.createElement("button");
    btn.classList.add("level-btn");
    
    if (i <= highestUnlockedLevel) {
      btn.textContent = `LEVEL ${i}`;
      btn.onclick = () => {
        currentLevel = i;
        score = 0;
        levelSelect.style.display = "none";
        startGame();
      };
    } else {
      btn.textContent = `🔒 LCK ${i}`;
      btn.classList.add("level-locked");
    }
    levelGrid.appendChild(btn);
  }
}

function showCredits() {
  creditsOverlay.style.display = "flex";
  setTimeout(() => {
    creditsOverlay.style.display = "none";
  }, 18000);
}

function showInstructions() {
  alert("Click poem words to gain score.\nReach the target score to complete each level.\nLevels 2 through 15 unlock progressively.\nPress ESC anytime to open settings or return to menu.");
}

function openSettings() {
  settingsOverlay.style.display = "flex";
}
function closeSettings() {
  settingsOverlay.style.display = "none";
}
function returnToMenuFromESC() {
  closeSettings();
  returnToMenu();
}

document.getElementById("crtRange").addEventListener("input", (e) => {
  document.body.style.opacity = e.target.value;
});
document.getElementById("glitchRange").addEventListener("input", (e) => {
  const val = e.target.value;
  const title = document.querySelector(".menu-title");
  if (title) {
    title.style.animationDuration = (0.25 + (1 - val) * 0.5) + "s";
  }
});
document.getElementById("volumeRange").addEventListener("input", (e) => {
  bgm.volume = e.target.value;
});

function startGame() {
  menuScreen.style.display = "none";
  levelSelect.style.display = "none";
  levelComplete.style.display = "none";
  gameComplete.style.display = "none";
  
  scoreboard.style.display = "flex";
  bgm.volume = 0.6;
  bgm.play();
  loadLevel(currentLevel);
  updateHUD();
}

function loadLevel(level) {
  poemGrid.innerHTML = "";
  poemGrid.style.display = "grid";
  
  for (let i = 0; i < 10; i++) {
    const word = document.createElement("div");
    word.classList.add("poemWord");
    word.textContent = `word ${i + 1}`;
    word.addEventListener("click", () => {
      score++;
      updateHUD();
      hitSfx.play();
      spawnParticles();
      word.style.opacity = "0";
      word.style.transform = "scale(0.5)";
      word.style.pointerEvents = "none";
      
      if (score >= levelTargets[currentLevel]) {
        completeLevel();
      }
    });
    poemGrid.appendChild(word);
  }
}

function updateHUD() {
  levelIndicator.textContent = `LEVEL ${currentLevel} / ${maxLevels}`;
  scoreIndicator.textContent = `SCORE: ${score}`;
}

function completeLevel() {
  poemGrid.style.display = "none";
  scoreboard.style.display = "none";
  bgm.pause();
  
  if (currentLevel > highestUnlockedLevel) {
    highestUnlockedLevel = currentLevel;
    localStorage.setItem("highestUnlockedLevel", highestUnlockedLevel);
  }

  if (currentLevel < maxLevels) {
    levelComplete.style.display = "flex";
    document.getElementById("levelCompleteTitle").textContent = `LEVEL ${currentLevel} COMPLETE!`;
  } else {
    gameComplete.style.display = "flex";
  }
}

function nextLevel() {
  levelComplete.style.display = "none";
  currentLevel++;
  score = 0;
  scoreboard.style.display = "flex";
  bgm.play();
  loadLevel(currentLevel);
  updateHUD();
}

function restartFullGame() {
  currentLevel = 1;
  score = 0;
  gameComplete.style.display = "none";
  scoreboard.style.display = "flex";
  bgm.play();
  loadLevel(currentLevel);
  updateHUD();
}

function returnToMenu() {
  poemGrid.style.display = "none";
  scoreboard.style.display = "none";
  levelComplete.style.display = "none";
  gameComplete.style.display = "none";
  levelSelect.style.display = "none";
  creditsOverlay.style.display = "none";
  settingsOverlay.style.display = "none";
  
  menuScreen.style.display = "flex";
  bgm.pause();
  bgm.currentTime = 0;
}

function spawnParticles() {
  for (let i = 0; i < 15; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");
    const dx = (Math.random() * 300 - 150) + "px";
    const dy = (Math.random() * 300 - 150) + "px";
    p.style.setProperty("--dx", dx);
    p.style.setProperty("--dy", dy);
    p.style.left = (window.innerWidth / 2) + "px";
    p.style.top = (window.innerHeight / 2) + "px";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (settingsOverlay.style.display === "flex") {
      closeSettings();
    } else {
      openSettings();
    }
  }
});
</script>
</body>
</html>
