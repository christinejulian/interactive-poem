<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Retro Arcade Poem — Off the Grid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Pixel Font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
/* -----------------------------------------------------------
   GLOBAL ARCADE LOOK
----------------------------------------------------------- */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  font-family: "Press Start 2P", monospace;
  overflow: hidden;
}

/* CRT Scanlines */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 2px,
    rgba(0,0,0,0.05) 3px
  );
  pointer-events: none;
  z-index: 1000;
}

/* Glow Overlay */
.arcade-glow {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 50% 20%, rgba(0,255,153,0.25), transparent 60%),
    radial-gradient(circle at 10% 80%, rgba(255,0,153,0.25), transparent 60%),
    radial-gradient(circle at 90% 60%, rgba(0,153,255,0.25), transparent 60%);
  mix-blend-mode: screen;
  pointer-events: none;
  z-index: 900;
}

/* -----------------------------------------------------------
   ARCADE CABINET FRAME
----------------------------------------------------------- */
.cabinet {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 88vw;
  height: 88vh;
  transform: translate(-50%, -50%);
  background: #111;
  border: 12px solid #0ff;
  border-radius: 18px;
  box-shadow:
    0 0 40px #0ff,
    0 0 80px #0ff inset,
    0 0 120px rgba(0,255,255,0.4) inset;
  overflow: hidden;
}

/* -----------------------------------------------------------
   RETRO MENU SCREEN
----------------------------------------------------------- */
.menu-screen {
  width: 100%;
  height: 100%;
  padding-top: 4rem;
  text-align: center;
  color: #0ff;
  display: flex;
  flex-direction: column;
  gap: 2rem;
  font-size: 1.2rem;
}

.menu-title {
  font-size: 2rem;
  text-shadow: 0 0 12px #0ff, 0 0 24px #0ff;
  letter-spacing: 0.15em;
}

.menu-option {
  padding: 1rem;
  margin: 0 auto;
  width: 60%;
  border: 3px solid #0ff;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
}

.menu-option:hover {
  background: #0ff;
  color: #000;
}

/* -----------------------------------------------------------
   POEM GRID (GAMEPLAY)
----------------------------------------------------------- */
.poem-grid {
  display: none;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 2rem;
  padding: 3rem;
  font-size: 1.2rem;
  color: #fff;
  text-align: center;
  transition: all 1s ease;
}

.poem-grid div {
  padding: 1rem;
  border: 2px solid #0ff;
  border-radius: 10px;
  background: rgba(0,0,0,0.6);
  box-shadow: 0 0 12px #0ff;
  transition: transform 2s ease, color 1s ease, text-shadow 1s ease;
  cursor: pointer;
}

.beat {
  border-color: #ff0;
  box-shadow: 0 0 12px #ff0;
}

/* -----------------------------------------------------------
   EXPLODED MODE
----------------------------------------------------------- */
.exploded div {
  position: relative;
  transform-origin: center;
}

/* -----------------------------------------------------------
   CONTROL PANEL
----------------------------------------------------------- */
.controls {
  display: none;
  position: absolute;
  bottom: 1rem;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: #0ff;
  font-size: 1rem;
}

button {
  font-family: "Press Start 2P", monospace;
  padding: 0.6rem 1.2rem;
  margin-top: 1rem;
  background: #000;
  border: 3px solid #0ff;
  color: #0ff;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  box-shadow: 0 0 12px #0ff;
}

button:hover {
  background: #0ff;
  color: #000;
}

/* -----------------------------------------------------------
   PARTICLES
----------------------------------------------------------- */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: #0ff;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.8;
  animation: fly 1.2s linear forwards;
}

@keyframes fly {
  from { transform: translate(0,0); opacity: 1; }
  to { transform: translate(var(--dx), var(--dy)); opacity: 0; }
}
</style>
</head>

<body>

<div class="arcade-glow"></div>

<div class="cabinet">

  <!-- RETRO MENU -->
  <div class="menu-screen" id="menuScreen">
    <div class="menu-title">ARCADE MENU</div>

    <div class="menu-option" onclick="startGame()">▶ START GAME</div>
    <div class="menu-option" onclick="showCredits()">★ CREDITS</div>
    <div class="menu-option" onclick="showInstructions()">❖ HOW TO PLAY</div>
  </div>

  <!-- GAMEPLAY: POEM GRID -->
  <div class="poem-grid" id="poemGrid">
    <div class="beat">arcade</div>
    <div>neon</div>
    <div>hum</div>
    <div>pixel</div>
    <div>dreams</div>

    <div class="beat">boss</div>
    <div>fights</div>
    <div>pulse</div>
    <div>through</div>
    <div>midnight</div>
    <div>party</div>
    <div>queues</div>

    <div class="beat">hearts</div>
    <div>level</div>
    <div>up</div>
    <div>in</div>
    <div>co-op</div>
  </div>

  <!-- Controls -->
  <div class="controls" id="controls">
    click anywhere to explode the grid  
    <br />
    <button id="explodeBtn">press start</button>
  </div>

</div>

<script>
/* -----------------------------------------------------------
   MENU FUNCTIONS
----------------------------------------------------------- */
function startGame() {
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("poemGrid").style.display = "grid";
  document.getElementById("controls").style.display = "block";
}

function showCredits() {
  alert("Created by Christine + Copilot\nRetro Arcade Poem — Off the Grid Edition");
}

function showInstructions() {
  alert("Use your mouse.\nClick anywhere to explode the poem.\nClick again to reset.\nPress Start to trigger chaos.");
}

/* -----------------------------------------------------------
   EXPLODE THE GRID
----------------------------------------------------------- */
const grid = document.getElementById("poemGrid");
const explodeBtn = document.getElementById("explodeBtn");
let exploded = false;

function explode() {
  exploded = !exploded;
  grid.classList.toggle("exploded");

  const words = grid.querySelectorAll("div");

  words.forEach(word => {
    const dx = (Math.random() * 200 - 100) + "px";
    const dy = (Math.random() * 200 - 100) + "px";
    const rot = (Math.random() * 360 - 180) + "deg";
    const scale = Math.random() * 1.5 + 0.5;

    word.style.transform = exploded
      ? `translate(${dx}, ${dy}) rotate(${rot}) scale(${scale})`
      : `translate(0,0) rotate(0deg) scale(1)`;

    word.style.color = exploded ? randomColor() : "#fff";
    word.style.textShadow = exploded ? `0 0 12px ${randomColor()}` : "0 0 12px #0ff";
  });

  spawnParticles();
}

function randomColor() {
  const colors = ["#0ff", "#ff0", "#f0f", "#0f0", "#f00", "#00f"];
  return colors[Math.floor(Math.random() * colors.length)];
}

/* -----------------------------------------------------------
   PARTICLE BURST
----------------------------------------------------------- */
function spawnParticles() {
  for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");

    const dx = (Math.random() * 400 - 200) + "px";
    const dy = (Math.random() * 400 - 200) + "px";

    p.style.setProperty("--dx", dx);
    p.style.setProperty("--dy", dy);

    p.style.left = (window.innerWidth / 2) + "px";
    p.style.top = (window.innerHeight / 2) + "px";

    document.body.appendChild(p);

    setTimeout(() => p.remove(), 1200);
  }
}

/* -----------------------------------------------------------
   EVENT LISTENERS
----------------------------------------------------------- */
explodeBtn.addEventListener("click", explode);
document.addEventListener("click", explode);
</script>

</body>
</html>
